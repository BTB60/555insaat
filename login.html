<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>555 İnşaat - Giriş</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <i class="bi bi-building"></i>
            <h1>555 İnşaat</h1>
            <p>İşçi İdarəetmə Sistemi</p>
        </div>

        <div class="login-card">
            <h2>Sistemə Giriş</h2>
            
            <div id="error-message" class="alert alert-danger d-none"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="bi bi-person"></i> İstifadəçi adı</label>
                    <input type="text" id="username" class="form-control" placeholder="İstifadəçi adı daxil edin" required>
                </div>
                
                <div class="form-group">
                    <label><i class="bi bi-lock"></i> Şifrə</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Şifrə daxil edin" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-check">
                    <input type="checkbox" id="remember" class="form-check-input">
                    <label for="remember" class="form-check-label">Məni yadda saxla</label>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Daxil ol
                </button>
            </form>
        </div>

        <!-- Demo Accounts -->
        <div class="demo-accounts">
            <h3><i class="bi bi-info-circle"></i> Demo Hesablar</h3>
            <div class="demo-grid">
                <div class="demo-card admin">
                    <span class="role-badge">Admin</span>
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
                <div class="demo-card employee">
                    <span class="role-badge">İşçi</span>
                    <p><strong>Username:</strong> murad</p>
                    <p><strong>Password:</strong> 123456</p>
                </div>
                <div class="demo-card employee">
                    <span class="role-badge">İşçi</span>
                    <p><strong>Username:</strong> resad</p>
                    <p><strong>Password:</strong> 123456</p>
                </div>
                <div class="demo-card employee">
                    <span class="role-badge">İşçi</span>
                    <p><strong>Username:</strong> kamran</p>
                    <p><strong>Password:</strong> 123456</p>
                </div>
            </div>
        </div>

        <p class="copyright">&copy; 2025 555 İnşaat. Bütün hüquqlar qorunur.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
